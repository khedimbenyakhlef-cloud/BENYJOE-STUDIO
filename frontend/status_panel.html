<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENY-JOE Studio — Panneau Statut</title>
<style>
  :root {
    --bg: #0d0d14;
    --surface: #181826;
    --border: #2a2a40;
    --accent: #7c5cbf;
    --text: #e0dff5;
    --text-muted: #8888aa;
    --green: #22c55e;
    --red: #ef4444;
    --green-glow: 0 0 18px #22c55e99, 0 0 6px #22c55e;
    --red-glow:   0 0 18px #ef444499, 0 0 6px #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 40px #00000060;
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.8rem;
    display: flex;
    align-items: center;
    gap: .6rem;
  }

  /* ── Lampe indicatrice ─────────────────────────────── */
  .status-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.6rem;
    padding: 1rem 1.2rem;
    background: #12121e;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .lamp {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background .4s ease, box-shadow .4s ease;
    background: var(--red);
    box-shadow: var(--red-glow);
  }

  .lamp.active {
    background: var(--green);
    box-shadow: var(--green-glow);
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: var(--green-glow); }
    50%       { box-shadow: 0 0 28px #22c55ecc, 0 0 10px #22c55e; }
  }

  .status-text {
    flex: 1;
  }

  .status-label {
    font-size: .75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .status-value {
    font-size: 1rem;
    font-weight: 600;
    margin-top: 2px;
  }

  .status-value.on  { color: var(--green); }
  .status-value.off { color: var(--red); }

  /* ── Sélecteur CPU / GPU ───────────────────────────── */
  .device-row {
    margin-bottom: 1.6rem;
  }

  .device-label {
    font-size: .78rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: .7rem;
    display: block;
  }

  .toggle-group {
    display: flex;
    gap: .5rem;
    background: #12121e;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .35rem;
  }

  .toggle-btn {
    flex: 1;
    padding: .6rem 1rem;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-size: .9rem;
    font-weight: 600;
    background: transparent;
    color: var(--text-muted);
    transition: all .25s ease;
    letter-spacing: .03em;
  }

  .toggle-btn.selected {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 12px #7c5cbf55;
  }

  .toggle-btn:hover:not(.selected) {
    background: #2a2a40;
    color: var(--text);
  }

  /* ── Prompt ────────────────────────────────────────── */
  .prompt-row {
    margin-bottom: 1.4rem;
  }

  textarea {
    width: 100%;
    background: #12121e;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: .9rem;
    padding: .8rem 1rem;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color .2s;
    font-family: inherit;
  }

  textarea:focus { border-color: var(--accent); }

  /* ── Boutons action ────────────────────────────────── */
  .actions {
    display: flex;
    gap: .8rem;
  }

  .btn {
    flex: 1;
    padding: .75rem 1rem;
    border: none;
    border-radius: 10px;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }

  .btn:active { transform: scale(.97); }

  .btn-generate {
    background: linear-gradient(135deg, #7c5cbf, #5a3f9e);
    color: #fff;
    box-shadow: 0 4px 18px #7c5cbf44;
  }

  .btn-generate:disabled {
    opacity: .45;
    cursor: not-allowed;
  }

  .btn-cancel {
    background: #2a1a1a;
    color: var(--red);
    border: 1px solid #3a1a1a;
  }

  .btn-cancel:hover { background: #3a1a1a; }

  /* ── Infos device ──────────────────────────────────── */
  .device-info {
    margin-top: 1.2rem;
    padding: .7rem 1rem;
    background: #12121e;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: .8rem;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }

  .device-info span { color: var(--text); font-weight: 600; }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">⚡ BENY-JOE Studio — Contrôle Moteur</div>

  <!-- Lampe indicatrice -->
  <div class="status-row">
    <div class="lamp" id="lamp"></div>
    <div class="status-text">
      <div class="status-label">État du moteur</div>
      <div class="status-value off" id="statusText">Inactif</div>
    </div>
    <div id="latencyBadge" style="font-size:.75rem;color:var(--text-muted)"></div>
  </div>

  <!-- Sélecteur CPU / GPU -->
  <div class="device-row">
    <span class="device-label">Processeur de génération</span>
    <div class="toggle-group">
      <button class="toggle-btn selected" id="btnCPU" onclick="selectDevice('cpu')">💻 CPU</button>
      <button class="toggle-btn"          id="btnGPU" onclick="selectDevice('cuda')">🎮 GPU (CUDA)</button>
    </div>
  </div>

  <!-- Prompt -->
  <div class="prompt-row">
    <textarea id="promptInput" placeholder="Décrivez votre scène cinématographique…"></textarea>
  </div>

  <!-- Boutons -->
  <div class="actions">
    <button class="btn btn-generate" id="btnGenerate" onclick="startGeneration()">▶ Générer</button>
    <button class="btn btn-cancel"   onclick="cancelGeneration()">✕ Reset</button>
  </div>

  <!-- Infos -->
  <div class="device-info">
    <div>Device actif : <span id="infoDevice">CPU</span></div>
    <div>Queue GPU : <span id="infoQueue">—</span></div>
    <div>Version : <span>v10.1</span></div>
  </div>
</div>

<script>
const API = window.location.origin; // même origine que Flask
let selectedDevice = 'cpu';
let pollTimer = null;

// ── Sélection device ─────────────────────────────────────────
function selectDevice(dev) {
  selectedDevice = dev;
  document.getElementById('btnCPU').classList.toggle('selected', dev === 'cpu');
  document.getElementById('btnGPU').classList.toggle('selected', dev === 'cuda');

  fetch(`${API}/api/engine/device`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({device: dev})
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) alert('⚠️ ' + d.error);
    else updateDeviceInfo(dev);
  })
  .catch(() => console.warn('Serveur non joignable'));
}

function updateDeviceInfo(dev) {
  document.getElementById('infoDevice').textContent = dev === 'cuda' ? 'GPU (CUDA)' : 'CPU';
}

// ── Lancer génération ────────────────────────────────────────
function startGeneration() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { alert('Veuillez entrer un prompt.'); return; }

  setLamp(true, 'Démarrage…');
  document.getElementById('btnGenerate').disabled = true;

  fetch(`${API}/api/engine/generate`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({prompt, device: selectedDevice})
  })
  .then(r => r.json())
  .then(d => {
    if (d.error) { setLamp(false, 'Erreur: ' + d.error); return; }
    pollStatus();
  })
  .catch(e => {
    setLamp(false, 'Serveur non joignable');
    document.getElementById('btnGenerate').disabled = false;
  });
}

// ── Annuler / reset ──────────────────────────────────────────
function cancelGeneration() {
  fetch(`${API}/api/engine/cancel`, {method:'POST'})
    .then(() => setLamp(false, 'Inactif'))
    .catch(() => {});
  clearInterval(pollTimer);
  document.getElementById('btnGenerate').disabled = false;
}

// ── Polling statut ───────────────────────────────────────────
function pollStatus() {
  clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    fetch(`${API}/api/engine/status`)
      .then(r => r.json())
      .then(d => {
        if (d.active) {
          setLamp(true, 'Génération en cours…');
        } else {
          setLamp(false, 'Inactif');
          clearInterval(pollTimer);
          document.getElementById('btnGenerate').disabled = false;
        }
        updateDeviceInfo(d.device || selectedDevice);
      })
      .catch(() => {});
  }, 1500);
}

// ── Mise à jour lampe ────────────────────────────────────────
function setLamp(active, label) {
  const lamp = document.getElementById('lamp');
  const text = document.getElementById('statusText');
  lamp.classList.toggle('active', active);
  text.textContent = label || (active ? 'Actif' : 'Inactif');
  text.className = 'status-value ' + (active ? 'on' : 'off');
}

// ── Health check au démarrage ────────────────────────────────
function checkHealth() {
  fetch(`${API}/api/health`)
    .then(r => r.json())
    .then(d => {
      document.getElementById('infoQueue').textContent = d.queue_size ?? '—';
    })
    .catch(() => {});
}

// ── Init ─────────────────────────────────────────────────────
checkHealth();
setInterval(checkHealth, 10000);

// Polling engine status en continu (lampe toujours à jour)
setInterval(() => {
  fetch(`${API}/api/engine/status`)
    .then(r => r.json())
    .then(d => {
      if (!document.getElementById('btnGenerate').disabled) {
        setLamp(d.active, d.active ? 'Génération en cours…' : 'Inactif');
      }
    })
    .catch(() => {});
}, 2000);
</script>
</body>
</html>
